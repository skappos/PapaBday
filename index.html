<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Papa's Play Pen</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100dvh;overflow:hidden;
  touch-action:none;
  font-family:Arial, Helvetica, sans-serif;
  background:#86d9ff;
}
#game{
  position:relative;width:100vw;height:100dvh;overflow:hidden;
  background:linear-gradient(#78d4ff 0%,#d7f7ff 45%,#f3ce7b 100%);
}
#header{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  z-index:50;text-align:center;width:min(94vw,780px);pointer-events:none;
}
#mainTitle{
  display:inline-block;background:linear-gradient(#9a5b2e,#66391d);
  color:#fff7dd;padding:9px 22px 6px;border-radius:18px;
  border:4px solid #4a2711;font-size:clamp(20px,4vw,38px);
  font-weight:1000;letter-spacing:1px;text-shadow:2px 3px 0 #3b220f;
  max-width:72vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#holeTitle{display:none}
.hud{
  position:absolute;z-index:60;top:16px;padding:10px 12px;
  background:rgba(23,50,77,.93);color:white;border:3px solid rgba(255,255,255,.35);
  border-radius:16px;text-align:center;box-shadow:0 5px 14px rgba(0,0,0,.25);
}
#holeHud{left:12px}
#strokeHud{right:12px}
#scorecard{
  position:absolute;right:12px;top:118px;z-index:61;width:190px;max-height:calc(100dvh - 205px);
  overflow:auto;background:rgba(255,247,221,.94);color:#17324d;border:3px solid rgba(23,50,77,.35);
  border-radius:16px;box-shadow:0 5px 14px rgba(0,0,0,.22);font-weight:900;
}
#scorecardTitle{padding:8px 10px 5px;text-align:center;background:#17324d;color:white;border-radius:12px 12px 0 0}
#scorecard table{
  width:100%;
  table-layout:fixed;
  border-collapse:collapse;
  font-size:11px;
}
#scorecard th,
#scorecard td{
  padding:2px 0;
  font-size:10px;
  white-space:nowrap;
}
#scorecard tr.activeHole{background:rgba(2,132,199,.18)}
#scorecard tfoot td{font-size:15px;background:#ead39b;border-bottom:0}
.hud .big{font-size:34px;font-weight:1000;line-height:1}
.hud .small{font-size:13px;font-weight:900;opacity:.95}
#course{
  position:absolute;left:50%;top:140px;transform:translateX(-50%);
  width:min(92vw,650px);height:calc(100dvh - 205px);
  min-height:520px;max-height:900px;border-radius:42px;overflow:hidden;
  border:14px solid #8b5a2b;box-shadow:0 20px 30px rgba(0,0,0,.25), inset 0 0 34px rgba(0,0,0,.20);
  background:#f3d38a;
}
#texture{position:absolute;inset:0;opacity:.7;z-index:0;pointer-events:none}
#endzone{
  position:absolute;top:0;left:0;right:0;height:110px;display:none;
  align-items:center;justify-content:center;color:white;font-size:clamp(32px,7vw,60px);
  font-weight:1000;letter-spacing:4px;background:#5b3318;
  text-shadow:0 4px 0 #1f1308;z-index:1;pointer-events:none;
}
#hole{
  position:absolute;width:44px;height:44px;border-radius:50%;background:#111;
  box-shadow:inset 0 9px 12px rgba(255,255,255,.12),0 0 0 6px rgba(255,255,255,.45);
  z-index:12;
}
#flag{position:absolute;width:4px;height:78px;background:white;z-index:13;pointer-events:none}
#flag:after{
  content:"";position:absolute;top:0;left:4px;border-top:12px solid transparent;
  border-bottom:12px solid transparent;border-left:28px solid #2563eb;
}
#walls,#obstacles{position:absolute;inset:0;z-index:15;pointer-events:none}
.wall{
  position:absolute;border-radius:12px;box-shadow:0 5px 10px rgba(0,0,0,.25);z-index:16;
}
.wall.sandbar{background:#d6a955;border:3px solid #a57426}
.wall.field{background:#7c2d12;border:3px solid #fb923c}
.wall.green{background:#166534;border:3px solid #052e16}
.wall.court{background:#92400e;border:3px solid #fff7ed}
.wall.work{background:#4a2711;border:3px solid #facc15}
.obstacle{
  position:absolute;display:flex;align-items:center;justify-content:center;user-select:none;
  z-index:18;
}
.obstacle span{filter:drop-shadow(0 5px 4px rgba(0,0,0,.25))}
.player{
  width:42px;height:46px;border-radius:10px;background:#5b3318;
  border:4px solid #fb923c;color:white;font-weight:1000;font-size:20px;
}
.player:before{display:none}
#ball{
  position:absolute;width:34px;height:34px;border-radius:50%;z-index:30;
  box-shadow:0 6px 12px rgba(0,0,0,.34);pointer-events:none;
}
.bocce{background:#0f766e;border:3px solid #d1fae5}
.bocce:after{content:"";position:absolute;inset:6px;border-radius:50%;border:2px solid rgba(255,255,255,.45)}
.golf{background:#f8fafc;border:2px solid #cbd5e1}
.golf:after{
  content:"";position:absolute;inset:6px;border-radius:50%;
  background:radial-gradient(circle,#cbd5e1 1px,transparent 2px);background-size:7px 7px;
}
.basketball{background:#f97316;border:2px solid #7c2d12}
.basketball:after{content:"";position:absolute;inset:4px;border-radius:50%;border-left:3px solid #7c2d12;border-right:3px solid #7c2d12}
.football{width:42px!important;height:28px!important;border-radius:50%;background:#7c2d12;border:2px solid #fff}
.football:after{content:"";position:absolute;left:15px;top:4px;width:10px;height:16px;border-left:2px solid white;border-right:2px solid white}
#aimSvg{
  position:absolute;inset:0;z-index:45;pointer-events:none;display:none;
}
#aimLine{stroke:white;stroke-width:6;stroke-linecap:round;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
#aimHead{fill:white;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
#powerText{
  position:absolute;z-index:46;color:white;font-weight:1000;text-shadow:0 2px 5px rgba(0,0,0,.7);
  display:none;pointer-events:none;
}
#message{
  position:absolute;left:50%;bottom:64px;transform:translateX(-50%);
  width:min(92vw,700px);z-index:70;text-align:center;color:white;
  font-weight:1000;font-size:clamp(16px,3vw,24px);text-shadow:0 3px 8px rgba(0,0,0,.55);
  pointer-events:none;
}
#controls{
  position:absolute;
  left:50%;
  bottom:8px;
  transform:translateX(-50%);
  width:min(94vw,900px);
  z-index:80;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
}
#leftControls{
  display:flex;
  gap:8px;
  align-items:center;
}
button{
  border:0;border-radius:999px;padding:10px 14px;background:#17324d;color:white;
  font-weight:1000;box-shadow:0 4px 8px rgba(0,0,0,.25);cursor:pointer;
}
.holeBtn{width:38px;height:38px;padding:0;background:#ead39b;color:#6b4a1b}
.holeBtn.active{background:#0284c7;color:white}
@media(max-width:700px){
  html,body{height:100dvh;overflow:hidden}
  #game{height:100dvh;overflow:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

  #holeHud{top:10px;left:8px}
  #strokeHud{top:10px;right:8px}
  .hud{padding:6px 7px;border-radius:14px;transform:scale(.86);transform-origin:top}
  .hud .big{font-size:28px}
  .hud .small{font-size:11px}

  /* Title sits centered between the HOLE and STROKES boxes */
  #header{
    top:18px;
    left:50%;
    transform:translateX(-50%);
    width:calc(100vw - 165px);
    z-index:65;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #mainTitle{
    width:100%;
    max-width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px 10px 8px;
    border-width:3px;
    border-radius:16px;
    font-size:18px;
    line-height:1.05;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
  }

  #scorecard{top:118px;left:50%;right:auto;transform:translateX(-50%);width:94vw;max-height:78px;overflow-x:auto;overflow-y:hidden;border-radius:14px;z-index:95}
  #scorecardTitle{padding:4px;font-size:12px}
  #scorecard table{font-size:10px;min-width:650px}
  #scorecard th,#scorecard td{padding:2px 4px}
  #scorecard tfoot td{font-size:11px}

  #course{top:205px;width:95vw;height:calc(100dvh - 320px);min-height:0;max-height:none;border-width:8px;border-radius:28px}

  /* Mobile course tuning: smaller ball + thinner walls = wider playable openings */
  #ball{width:28px;height:28px}
  .football{width:34px!important;height:22px!important}
  .wall{border-width:2px}

  #controls{bottom:calc(10px + env(safe-area-inset-bottom));width:98vw;gap:4px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;justify-content:flex-start;padding:0 6px}
  #leftControls{display:flex;gap:4px;flex-shrink:0}
  #holeButtons{display:flex;gap:4px;flex-shrink:0}
  button{flex-shrink:0;padding:8px 11px}
  .holeBtn{width:32px;height:32px;min-width:32px;font-size:14px}
  #prevBtn,#nextBtn{width:38px;height:38px;padding:0}
  #resetBtn{padding:8px 12px;font-size:13px}
}
</style>
</head>

  innout:["repeating-linear-gradient(45deg, rgba(220,38,38,.18) 0 18px, transparent 18px 36px), linear-gradient(#fef3c7 0%, #fde68a 100%)","100% 100%,100% 100%"],
  radar:["radial-gradient(circle at 20% 20%, rgba(146,64,14,.12) 0 6px, transparent 6px), linear-gradient(#d9f99d 0%, #bbf7d0 100%)","80px 80px,100% 100%"],
  movies:["repeating-linear-gradient(90deg, rgba(127,29,29,.35) 0 14px, transparent 14px 28px), linear-gradient(#111827 0%, #1f2937 100%)","100% 100%,100% 100%"],
  magic:["radial-gradient(circle at 20% 20%, rgba(255,255,255,.12) 0 3px, transparent 3px), linear-gradient(#581c87 0%, #7c3aed 100%)","50px 50px,100% 100%"],
  rock:["repeating-linear-gradient(45deg, rgba(245,158,11,.18) 0 14px, transparent 14px 28px), linear-gradient(#111827 0%, #1e293b 100%)","100% 100%,100% 100%"],
  dessert:["radial-gradient(circle at 20% 20%, rgba(255,255,255,.18) 0 4px, transparent 4px), linear-gradient(#fecdd3 0%, #f9a8d4 100%)","60px 60px,100% 100%"]
 };
 texture.style.backgroundImage=m[t][0]; texture.style.backgroundSize=m[t][1];
}
function drawBall(){ball.style.left=ballX+"px";ball.style.top=ballY+"px"}
function fitTitle(){
 const el=$("mainTitle");
 if(!el)return;
 el.style.fontSize="";
 if(window.innerWidth>700)return;
 let size=18;
 el.style.fontSize=size+"px";
 while(el.scrollWidth>el.clientWidth&&size>9){
  size-=.5;
  el.style.fontSize=size+"px";
 }
}
function updateScorecard(){
 const rows=$("scoreRows");
 rows.innerHTML="";
 scores.forEach((score,i)=>{
  const tr=document.createElement("tr");
  if(i===current)tr.className="activeHole";
  const scoreText=score===null?"—":score;
  tr.innerHTML=`<td>${i+1}</td><td>${HOLES[i].par}</td><td>${scoreText}</td>`;
  rows.appendChild(tr);
 });
 $("totalScore").textContent=scores.reduce((sum,score)=>sum+(score||0),0);
}
function loadHole(i){
 current=i;strokes=0;vx=0;vy=0;completed=false;dragging=false;hideAim();
 const h=HOLES[i],s=ballSize();
 course.style.background=h.bg;course.style.borderColor=h.border;setTexture(h.texture);
 endzone.style.display=h.endzone?"flex":"none";
 $("mainTitle").textContent=`Hole ${i+1} — ${h.name}`;fitTitle();$("holeNum").textContent=i+1;$("par").textContent=`PAR ${h.par}`;$("strokes").textContent=0;
 ball.className=h.ball;
 const bs=ballSize();ballX=px(h.start.x)-bs.w/2;ballY=py(h.start.y)-bs.h/2;
 holeEl.style.left=(px(h.hole.x)-22)+"px";holeEl.style.top=(py(h.hole.y)-22)+"px";
 flag.style.left=px(h.hole.x)+"px";flag.style.top=(py(h.hole.y)-82)+"px";
 wallsEl.innerHTML="";obstaclesEl.innerHTML="";walls=[];obstacles=[];
 h.walls.forEach(a=>{
  let [x,y,w,h,cls]=a;
  const originalW=w, originalH=h;
  if(isMobile()){
    w*=.62;
    h*=.62;
  }
  const r={x:px(x+(originalW-w)/2),y:py(y+(originalH-h)/2),w:px(w),h:py(h)};
  const el=document.createElement("div");
  el.className=`wall ${cls}`;
  Object.assign(el.style,{left:r.x+"px",top:r.y+"px",width:r.w+"px",height:r.h+"px"});
  wallsEl.appendChild(el);
  walls.push(r);
 });
 h.obstacles.forEach(o=>{const [type,val,x,y,r]=o;const ox=px(x),oy=py(y);const el=document.createElement("div");el.className="obstacle";Object.assign(el.style,{left:(ox-r)+"px",top:(oy-r)+"px",width:(r*2)+"px",height:(r*2)+"px"});if(type==="player"){el.classList.add("player");el.textContent=val}else{el.innerHTML=`<span style="font-size:${Math.max(36,r*1.42)}px">${val}</span>`}obstaclesEl.appendChild(el);obstacles.push({x:ox,y:oy,r})});
 document.querySelectorAll(".holeBtn").forEach((b,n)=>b.classList.toggle("active",n===i));
 $("message").textContent="";
 updateScorecard();
 drawBall();
}
function point(e){const r=course.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
function showAim(p){
 const c=center();let dx=p.x-c.x,dy=p.y-c.y;let len=Math.hypot(dx,dy);if(len<1)len=1;
 const max=145, shown=Math.min(len,max), ux=dx/len, uy=dy/len;
 const ex=c.x+ux*shown, ey=c.y+uy*shown;
 aimSvg.style.display="block";powerText.style.display="block";
 aimLine.setAttribute("x1",c.x);aimLine.setAttribute("y1",c.y);aimLine.setAttribute("x2",ex);aimLine.setAttribute("y2",ey);
 const head=16,wide=11, bx=ex-ux*head, by=ey-uy*head, pxp=-uy, pyp=ux;
 aimHead.setAttribute("points",`${ex},${ey} ${bx+pxp*wide},${by+pyp*wide} ${bx-pxp*wide},${by-pyp*wide}`);
 powerText.textContent=`Power ${Math.round(Math.min(len,max)/max*100)}%`;
 powerText.style.left=(ex+10)+"px";powerText.style.top=(ey-20)+"px";
 aimTarget=p;
}
function hideAim(){aimSvg.style.display="none";powerText.style.display="none";aimTarget=null}
course.addEventListener("pointerdown",e=>{
 if(completed||Math.hypot(vx,vy)>.3)return;
 dragging=true;course.setPointerCapture?.(e.pointerId);showAim(point(e));
});
course.addEventListener("pointermove",e=>{if(dragging)showAim(point(e))});
course.addEventListener("pointerup",e=>{
 if(!dragging)return;dragging=false;const p=aimTarget||point(e);const c=center();
 let dx=p.x-c.x,dy=p.y-c.y,len=Math.hypot(dx,dy);hideAim();if(len<8)return;
 const power=Math.min(len,145)*0.105;vx=dx/len*power;vy=dy/len*power;strokes++;$("strokes").textContent=strokes;
});

function collideRect(cx,cy,r,rect){
 const qx=Math.max(rect.x,Math.min(cx,rect.x+rect.w)),qy=Math.max(rect.y,Math.min(cy,rect.y+rect.h));
 const dx=cx-qx,dy=cy-qy;return dx*dx+dy*dy<r*r;
}
function tick(){
 const s=ballSize();
 ballX+=vx;ballY+=vy;vx*=.985;vy*=.985;if(Math.abs(vx)<.025)vx=0;if(Math.abs(vy)<.025)vy=0;
 const maxX=W()-s.w,maxY=H()-s.h;if(ballX<0){ballX=0;vx*=-.78}if(ballY<0){ballY=0;vy*=-.78}if(ballX>maxX){ballX=maxX;vx*=-.78}if(ballY>maxY){ballY=maxY;vy*=-.78}
 let c=center();
 walls.forEach(r=>{
  if(collideRect(c.x,c.y,s.r,r)){
    const left=Math.abs(c.x-r.x),right=Math.abs(c.x-(r.x+r.w)),top=Math.abs(c.y-r.y),bottom=Math.abs(c.y-(r.y+r.h));
    const m=Math.min(left,right,top,bottom);
    if(m===left){ballX=r.x-s.w-1;vx=-Math.abs(vx)*.82}
    else if(m===right){ballX=r.x+r.w+1;vx=Math.abs(vx)*.82}
    else if(m===top){ballY=r.y-s.h-1;vy=-Math.abs(vy)*.82}
    else{ballY=r.y+r.h+1;vy=Math.abs(vy)*.82}
    c=center();
  }
 });
 obstacles.forEach(o=>{
  const dx=c.x-o.x,dy=c.y-o.y,d=Math.hypot(dx,dy),min=o.r+s.r;
  if(d<min&&d>0){const nx=dx/d,ny=dy/d,over=min-d;ballX+=nx*over;ballY+=ny*over;const dot=vx*nx+vy*ny;vx=(vx-2*dot*nx)*.80;vy=(vy-2*dot*ny)*.80;c=center();}
 });
 const h=HOLES[current],hx=px(h.hole.x),hy=py(h.hole.y);
 if(!completed&&Math.hypot(c.x-hx,c.y-hy)<24&&Math.hypot(vx,vy)<4.4){
  completed=true;vx=0;vy=0;scores[current]=strokes;updateScorecard();$("message").textContent=`🎉 ${h.name} complete!`;
  if(current<HOLES.length-1)setTimeout(()=>loadHole(current+1),950);
 }
 drawBall();requestAnimationFrame(tick);
}
$("resetBtn").onclick=()=>{scores[current]=null;loadHole(current)};
$("prevBtn").onclick=()=>loadHole((current-1+HOLES.length)%HOLES.length);
$("nextBtn").onclick=()=>loadHole((current+1)%HOLES.length);
HOLES.forEach((h,i)=>{const b=document.createElement("button");b.className="holeBtn";b.textContent=i+1;b.onclick=()=>loadHole(i);$("holeButtons").appendChild(b)});
let resizeTimer;window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>loadHole(current),100)});
loadHole(0);tick();
</script>
</body>
</html>
